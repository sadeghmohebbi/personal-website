name: Deploy to ArvanCloud S3

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          ELEVENTY_RUN_MODE: build

      - name: Configure AWS credentials for ArvanCloud
        run: |
          aws configure set aws_access_key_id ${{ secrets.ARVAN_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.ARVAN_SECRET_ACCESS_KEY }}
          aws configure set default.region ir-tbz-sh1
          aws configure set s3.endpoint_url https://s3.ir-tbz-sh1.arvanstorage.ir
          aws configure set sts.endpoint_url https://s3.ir-tbz-sh1.arvanstorage.ir

      - name: Deploy static assets (long cache)
        run: |
          aws s3 sync --delete --no-follow-symlinks \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" --exclude "*.json" --exclude "*.xml" \
            --exclude "*.txt" --exclude "*.webmanifest" \
            --acl public-read \
            _site/ s3://sadeghmohebbi-site/

      - name: Deploy HTML/JSON/XML (no cache)
        run: |
          aws s3 sync --delete --no-follow-symlinks \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" --include "*.json" --include "*.xml" \
            --include "*.txt" --include "*.webmanifest" \
            --acl public-read \
            _site/ s3://sadeghmohebbi-site/

      - name: Verify deployment
        run: |
          echo "=== Bucket contents ==="
          aws s3 ls s3://sadeghmohebbi-site/ --recursive --human-readable --summarize