name: Deploy to ArvanCloud S3

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          ELEVENTY_RUN_MODE: build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ARVAN_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ARVAN_SECRET_ACCESS_KEY }}
          aws-region: ir-tbz-sh1

      - name: Deploy to ArvanCloud S3
        run: |
          aws s3 sync _site/ s3://sadeghmohebbi-site \
            --endpoint-url https://s3.ir-tbz-sh1.arvanstorage.ir \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --exclude "*.webmanifest"

      - name: Deploy HTML/JSON/XML with no-cache
        run: |
          aws s3 sync _site/ s3://sadeghmohebbi-site \
            --endpoint-url https://s3.ir-tbz-sh1.arvanstorage.ir \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "*.json" \
            --include "*.xml" \
            --include "*.txt" \
            --include "*.webmanifest"

      - name: Set public read ACL
        run: |
          aws s3 cp s3://sadeghmohebbi-site s3://sadeghmohebbi-site \
            --endpoint-url https://s3.ir-tbz-sh1.arvanstorage.ir \
            --recursive \
            --acl public-read \
            --metadata-directive REPLACE
