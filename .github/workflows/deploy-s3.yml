name: Deploy to ArvanCloud S3 (s3cmd)

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          ELEVENTY_RUN_MODE: build

      - name: Install s3cmd
        run: |
          sudo apt-get update && sudo apt-get install -y s3cmd

      - name: Configure s3cmd
        env:
          ARVAN_ACCESS_KEY_ID: ${{ secrets.ARVAN_ACCESS_KEY_ID }}
          ARVAN_SECRET_ACCESS_KEY: ${{ secrets.ARVAN_SECRET_ACCESS_KEY }}
        run: |
          cat > ~/.s3cfg << 'EOF'
          [default]
          access_key = ${ARVAN_ACCESS_KEY_ID}
          secret_key = ${ARVAN_SECRET_ACCESS_KEY}
          host_base = s3.ir-tbz-sh1.arvanstorage.ir
          host_bucket = %(bucket)s.s3.ir-tbz-sh1.arvanstorage.ir
          use_https = True
          signature_v2 = False
          multipart_chunk_size_mb = 15
          send_chunk = 10000000
          EOF

      - name: Deploy static assets (long cache)
        env:
          ARVAN_ACCESS_KEY_ID: ${{ secrets.ARVAN_ACCESS_KEY_ID }}
          ARVAN_SECRET_ACCESS_KEY: ${{ secrets.ARVAN_SECRET_ACCESS_KEY }}
        run: |
          s3cmd sync --delete-removed \
            --add-header="Cache-Control:public, max-age=31536000, immutable" \
            --exclude="*.html" --exclude="*.json" --exclude="*.xml" \
            --exclude="*.txt" --exclude="*.webmanifest" \
            --acl-public \
            _site/ s3://sadeghmohebbi-site/

      - name: Deploy HTML/JSON/XML (no cache)
        env:
          ARVAN_ACCESS_KEY_ID: ${{ secrets.ARVAN_ACCESS_KEY_ID }}
          ARVAN_SECRET_ACCESS_KEY: ${{ secrets.ARVAN_SECRET_ACCESS_KEY }}
        run: |
          s3cmd sync --delete-removed \
            --add-header="Cache-Control:public, max-age=0, must-revalidate" \
            --include="*.html" --include="*.json" --include="*.xml" \
            --include="*.txt" --include="*.webmanifest" \
            --acl-public \
            _site/ s3://sadeghmohebbi-site/

      - name: Verify deployment
        env:
          ARVAN_ACCESS_KEY_ID: ${{ secrets.ARVAN_ACCESS_KEY_ID }}
          ARVAN_SECRET_ACCESS_KEY: ${{ secrets.ARVAN_SECRET_ACCESS_KEY }}
        run: |
          echo "=== Bucket contents ==="
          s3cmd ls s3://sadeghmohebbi-site/
          echo ""
          echo "=== File count ==="
          s3cmd ls s3://sadeghmohebbi-site/ | wc -l